spring.application.name=HSBC_XVA_TECH_LEAD
server.port=8081

# In-memory H2 DB for local dev - replace with real datasource when ready
spring.datasource.url=jdbc:h2:mem:hsbcxva;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
